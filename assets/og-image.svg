<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">中文排版问题小测验</title>
  <desc id="desc">8 题，约 2 分钟，测试你能不能发现中文网页里的排版问题。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset="1" stop-color="#f1e2c8"/>
    </linearGradient>
    <radialGradient id="glow" cx="15%" cy="12%" r="72%">
      <stop offset="0" stop-color="#8f2f1f" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8f2f1f" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#4d3418" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g filter="url(#shadow)">
    <rect x="92" y="76" width="1016" height="478" rx="34" fill="#fbf6ea" stroke="#d8c29d" stroke-width="3"/>
    <rect x="118" y="102" width="964" height="426" rx="24" fill="none" stroke="#d8c29d" stroke-width="2" stroke-opacity="0.58"/>
  </g>
  <g transform="translate(142 142)">
    <text x="0" y="0" fill="#7b6547" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif" font-size="32" font-weight="700" letter-spacing="4">8 题 · 约 2 分钟</text>
    <text x="0" y="132" fill="#30251b" font-family="Songti SC, STSong, 'Noto Serif CJK SC', serif" font-size="92" font-weight="800">中文排版</text>
    <text x="0" y="242" fill="#30251b" font-family="Songti SC, STSong, 'Noto Serif CJK SC', serif" font-size="92" font-weight="800">问题小测验</text>
    <text x="0" y="326" fill="#5c2017" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif" font-size="38" font-weight="700">你能看出这行字哪里不对劲吗？</text>
  </g>
</svg>
