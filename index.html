<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中文排版问题小测验</title>
  <meta name="description" content="8 道题，看看你能不能发现中文网页和电子书中常见的排版问题。内容基于 W3C 中文排版需求。">
  <meta name="theme-color" content="#8f2f1f">
  <meta property="og:title" content="中文排版问题小测验">
  <meta property="og:description" content="8 道题，测试你的中文排版敏感度。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/og-image.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="assets/og-image.svg">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="site-header" aria-label="页面标题">
      <a id="header-clreq-link" class="text-link" href="https://www.w3.org/TR/clreq/">W3C中文排版需求</a>
      <div id="language-switcher" class="language-switcher" role="group" aria-label="语言选择">
        <button class="language-button" type="button" data-language="zh-Hans" aria-pressed="true">简体</button>
        <button class="language-button" type="button" data-language="zh-Hant" aria-pressed="false">繁體</button>
      </div>
      <!-- <span aria-hidden="true">·</span>
      <a class="text-link" href="#">中文支持特别任务组</a> -->
    </header>

    <main id="app" class="quiz-app">
      <section id="start-view" class="view hero-view" aria-labelledby="quiz-title">
        <div class="hero-title-block">
          <p id="start-eyebrow" class="eyebrow">8 题 · 约 2 分钟</p>
          <h1 id="quiz-title" class="vertical-title">中文排版<br>问题小测验</h1>
        </div>
        <div class="paper-card intro-card">
          <p class="seal" aria-hidden="true">clreq</p>
          <h2 id="intro-title">这行字，哪里不对劲？</h2>
          <p id="intro-description">标点、换行、着重号、段首缩排……中文网页里的很多细节，平时可能不注意，错了就会影响阅读体验。</p>
          <p id="intro-note">本测验基于 W3C《中文排版需求》整理，每次随机抽取 8 题。</p>
          <button id="start-button" class="primary-button" type="button">开始测验</button>
        </div>
      </section>

      <section id="quiz-view" class="view quiz-view" aria-labelledby="question-title" hidden>
        <div class="progress-row" aria-label="答题进度">
          <span id="progress-text">第 1 / 8 题</span>
          <span id="topic-label" class="topic-label">标点</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <span id="progress-bar" class="progress-bar"></span>
        </div>

        <article class="paper-card question-card">
          <h2 id="question-title"></h2>
          <div id="scenario" class="scenario"></div>
          <div id="choices" class="choice-list" role="group" aria-labelledby="question-title"></div>
          <p id="choice-warning" class="warning" role="status" hidden>请先选择一个答案。</p>
        </article>

        <section id="feedback" class="feedback-card" aria-live="polite" hidden></section>
      </section>

      <section id="result-view" class="view result-view" aria-labelledby="result-title" hidden>
        <div class="paper-card result-card">
          <p id="result-eyebrow" class="eyebrow">测验完成</p>
          <h2 id="result-title"></h2>
          <p id="result-score" class="score-line"></p>
          <p id="result-description"></p>
          <div id="weaknesses" class="weakness-list"></div>
          <div class="result-actions">
            <button id="share-button" class="primary-button" type="button">直接分享</button>
            <button id="copy-button" class="secondary-button" type="button">复制分享文案</button>
            <button id="restart-button" class="secondary-button" type="button">再测一次</button>
          </div>
          <div class="result-links" aria-label="继续了解或参与">
            <a id="result-clreq-link" href="https://www.w3.org/TR/clreq/" target="_blank" rel="noopener">阅读 clreq</a>
            <a id="source-link" href="https://github.com/xfq/clreq-quiz" target="_blank" rel="noopener">查看源码</a>
            <a id="contribute-link" href="https://github.com/xfq/clreq-quiz/issues/new?title=%E8%B4%A1%E7%8C%AE%E4%B8%80%E9%81%93%E4%B8%AD%E6%96%87%E6%8E%92%E7%89%88%E9%A2%98" target="_blank" rel="noopener">贡献题目</a>
          </div>
          <textarea id="share-text" class="share-text" readonly aria-label="可手动复制的分享文案"></textarea>
        </div>
      </section>
    </main>

    <noscript>
      <section class="paper-card noscript-card">
        <h2>需要启用 JavaScript 才能进行测验</h2>
        <p>你仍然可以阅读 <a href="https://www.w3.org/TR/clreq/">W3C《中文排版需求》</a>了解中文排版规则。</p>
      </section>
    </noscript>

    <footer class="site-footer">
      <a id="footer-clreq-link" href="https://www.w3.org/TR/clreq/">中文排版需求</a>
      <!-- <a href="https://github.com/xfq/clreq-quiz">项目源码</a> -->
      <a id="footer-contribute-link" href="https://github.com/xfq/clreq-quiz/issues">贡献题目</a>
      <!-- <a href="https://github.com/w3c/clreq/issues">clreq Issues</a> -->
    </footer>
  </div>
</body>
</html>
